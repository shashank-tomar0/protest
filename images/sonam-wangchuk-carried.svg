<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#d4cfc5"/>
    </radialGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e4dc"/>
      <stop offset="100%" stop-color="#f5f0e8"/>
    </linearGradient>
    <linearGradient id="khakiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9e8b6e"/>
      <stop offset="100%" stop-color="#7a6a52"/>
    </linearGradient>
    <linearGradient id="khakiGradDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a7a5e"/>
      <stop offset="100%" stop-color="#665840"/>
    </linearGradient>
    <linearGradient id="redRobeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc3333"/>
      <stop offset="50%" stop-color="#b32020"/>
      <stop offset="100%" stop-color="#991a1a"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.25"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#skyGrad)" opacity="0.5"/>

  <!-- Jantar Mantar observatory structures in background -->
  <g opacity="0.25">
    <rect x="80" y="120" width="12" height="280" fill="#b8a88a" rx="2"/>
    <polygon points="86,120 86,400 140,380 140,180" fill="#c4b498"/>
    <rect x="160" y="180" width="8" height="220" fill="#b8a88a" rx="2"/>
    <path d="M164 180 Q200 160 240 180 L240 400 L164 400 Z" fill="#c4b498"/>
    <rect x="900" y="180" width="180" height="220" fill="#d0c8b8" rx="4"/>
    <rect x="920" y="160" width="140" height="20" fill="#d0c8b8" rx="2"/>
    <circle cx="990" cy="200" r="25" fill="none" stroke="#d0c8b8" stroke-width="2"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="580" width="1200" height="220" fill="#c8b898"/>
  <rect x="0" y="580" width="1200" height="8" fill="#b8a888"/>
  <rect x="0" y="620" width="1200" height="3" fill="#bfaf8f" opacity="0.5"/>

  <!-- Ground shadow -->
  <ellipse cx="600" cy="590" rx="250" ry="20" fill="#000" opacity="0.12"/>

  <!-- ===== POLICE OFFICERS ===== -->

  <!-- Officer 1 - front left -->
  <g filter="url(#softShadow)">
    <ellipse cx="480" cy="510" rx="28" ry="18" fill="url(#khakiGradDark)"/>
    <rect x="460" y="440" width="40" height="72" rx="6" fill="url(#khakiGrad)"/>
    <rect x="458" y="478" width="44" height="6" rx="2" fill="#4a3d2e"/>
    <rect x="468" y="438" width="24" height="8" rx="3" fill="#5a4d3e"/>
    <circle cx="480" cy="420" r="20" fill="#c4956a"/>
    <ellipse cx="480" cy="406" rx="22" ry="8" fill="#6a5a42"/>
    <rect x="462" y="404" width="36" height="14" rx="4" fill="#6a5a42"/>
    <rect x="466" y="404" width="28" height="4" rx="1" fill="#8a7a5e"/>
    <ellipse cx="480" cy="418" rx="14" ry="12" fill="#c4956a"/>
    <path d="M465 458 Q440 430 455 400" stroke="url(#khakiGrad)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M495 458 Q520 430 505 400" stroke="url(#khakiGrad)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <circle cx="505" cy="398" r="6" fill="#c4956a"/>
  </g>

  <!-- Officer 2 - front right -->
  <g filter="url(#softShadow)">
    <ellipse cx="720" cy="510" rx="28" ry="18" fill="url(#khakiGradDark)"/>
    <rect x="700" y="440" width="40" height="72" rx="6" fill="url(#khakiGrad)"/>
    <rect x="698" y="478" width="44" height="6" rx="2" fill="#4a3d2e"/>
    <rect x="708" y="438" width="24" height="8" rx="3" fill="#5a4d3e"/>
    <circle cx="720" cy="420" r="20" fill="#b8875a"/>
    <ellipse cx="720" cy="406" rx="22" ry="8" fill="#6a5a42"/>
    <rect x="702" y="404" width="36" height="14" rx="4" fill="#6a5a42"/>
    <rect x="706" y="404" width="28" height="4" rx="1" fill="#8a7a5e"/>
    <ellipse cx="720" cy="418" rx="14" ry="12" fill="#b8875a"/>
    <path d="M705 458 Q680 430 695 400" stroke="url(#khakiGrad)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M735 458 Q760 430 745 400" stroke="url(#khakiGrad)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <circle cx="695" cy="398" r="6" fill="#b8875a"/>
  </g>

  <!-- Officer 3 - back left -->
  <g filter="url(#softShadow)" opacity="0.85">
    <ellipse cx="430" cy="530" rx="26" ry="16" fill="url(#khakiGradDark)"/>
    <rect x="412" y="465" width="36" height="66" rx="5" fill="url(#khakiGrad)"/>
    <rect x="410" y="500" width="40" height="5" rx="2" fill="#4a3d2e"/>
    <circle cx="430" cy="448" r="18" fill="#d4a87a"/>
    <ellipse cx="430" cy="436" rx="20" ry="7" fill="#6a5a42"/>
    <rect x="414" y="434" width="32" height="12" rx="3" fill="#6a5a42"/>
    <rect x="418" y="434" width="24" height="3" rx="1" fill="#8a7a5e"/>
    <path d="M416 475 Q398 450 412 428" stroke="url(#khakiGrad)" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M444 475 Q462 450 448 428" stroke="url(#khakiGrad)" stroke-width="9" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Officer 4 - back right -->
  <g filter="url(#softShadow)" opacity="0.85">
    <ellipse cx="770" cy="530" rx="26" ry="16" fill="url(#khakiGradDark)"/>
    <rect x="752" y="465" width="36" height="66" rx="5" fill="url(#khakiGrad)"/>
    <rect x="750" y="500" width="40" height="5" rx="2" fill="#4a3d2e"/>
    <circle cx="770" cy="448" r="18" fill="#c4956a"/>
    <ellipse cx="770" cy="436" rx="20" ry="7" fill="#6a5a42"/>
    <rect x="754" y="434" width="32" height="12" rx="3" fill="#6a5a42"/>
    <rect x="758" y="434" width="24" height="3" rx="1" fill="#8a7a5e"/>
    <path d="M756 475 Q738 450 752 428" stroke="url(#khakiGrad)" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M784 475 Q802 450 788 428" stroke="url(#khakiGrad)" stroke-width="9" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Officer 5 - far left -->
  <g filter="url(#softShadow)" opacity="0.7">
    <ellipse cx="395" cy="545" rx="24" ry="14" fill="url(#khakiGradDark)"/>
    <rect x="379" y="488" width="32" height="58" rx="5" fill="url(#khakiGrad)"/>
    <circle cx="395" cy="472" r="16" fill="#d4a87a"/>
    <ellipse cx="395" cy="462" rx="18" ry="6" fill="#6a5a42"/>
    <rect x="381" y="460" width="28" height="10" rx="3" fill="#6a5a42"/>
  </g>

  <!-- Officer 6 - far right -->
  <g filter="url(#softShadow)" opacity="0.7">
    <ellipse cx="805" cy="545" rx="24" ry="14" fill="url(#khakiGradDark)"/>
    <rect x="789" y="488" width="32" height="58" rx="5" fill="url(#khakiGrad)"/>
    <circle cx="805" cy="472" r="16" fill="#b8875a"/>
    <ellipse cx="805" cy="462" rx="18" ry="6" fill="#6a5a42"/>
    <rect x="791" y="460" width="28" height="10" rx="3" fill="#6a5a42"/>
  </g>

  <!-- ===== SONAM WANGCHUK - CENTRAL FIGURE ===== -->
  <g filter="url(#softShadow)">
    <!-- Red Ladakhi pheran (traditional robe) -->
    <path d="M530 360 Q520 340 540 320 L540 320 Q560 310 600 310 Q640 310 660 320 L660 320 Q680 340 670 360 L680 420 Q690 480 670 520 Q660 540 630 545 L600 548 L570 545 Q540 540 530 520 Q510 480 520 420 Z" fill="url(#redRobeGrad)"/>

    <!-- Dark inner robe at collar -->
    <path d="M560 315 Q580 308 600 308 Q620 308 640 315 L635 325 Q620 318 600 318 Q580 318 565 325 Z" fill="#7a1414"/>

    <!-- Robe folds -->
    <path d="M570 380 Q575 420 572 470" stroke="#8a1a1a" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M630 380 Q625 420 628 470" stroke="#8a1a1a" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M555 430 Q575 445 600 448 Q625 445 645 430" stroke="#8a1a1a" stroke-width="1" fill="none" opacity="0.3"/>

    <!-- Lower robe folds -->
    <path d="M535 500 Q560 525 600 530 Q640 525 665 500" stroke="#8a1a1a" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M545 520 Q570 540 600 542 Q630 540 655 520" stroke="#8a1a1a" stroke-width="1" fill="none" opacity="0.3"/>

    <!-- Belt/sash -->
    <rect x="555" y="420" width="90" height="6" rx="3" fill="#8a2020"/>
    <rect x="555" y="420" width="90" height="3" rx="2" fill="#a63030" opacity="0.6"/>

    <!-- Arms leading to namaste fold -->
    <path d="M540 335 Q520 350 540 370" stroke="url(#redRobeGrad)" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M660 335 Q680 350 660 370" stroke="url(#redRobeGrad)" stroke-width="12" stroke-linecap="round" fill="none"/>

    <!-- Hands folded in namaste -->
    <path d="M570 335 Q585 320 600 318 Q615 320 630 335" stroke="#d4a87a" stroke-width="3" fill="none"/>
    <rect x="588" y="330" width="24" height="18" rx="6" fill="#d4a87a" transform="rotate(-5 600 340)"/>
    <rect x="590" y="332" width="20" height="14" rx="4" fill="#e0b88a" transform="rotate(-5 600 340)"/>
    <!-- Finger lines -->
    <line x1="592" y1="334" x2="592" y2="345" stroke="#c4956a" stroke-width="0.8"/>
    <line x1="596" y1="333" x2="596" y2="346" stroke="#c4956a" stroke-width="0.8"/>
    <line x1="600" y1="332" x2="600" y2="346" stroke="#c4956a" stroke-width="0.8"/>
    <line x1="604" y1="333" x2="604" y2="346" stroke="#c4956a" stroke-width="0.8"/>
    <line x1="608" y1="334" x2="608" y2="345" stroke="#c4956a" stroke-width="0.8"/>

    <!-- Neck -->
    <rect x="585" y="295" width="30" height="15" rx="5" fill="#c4956a"/>

    <!-- Head -->
    <ellipse cx="600" cy="272" rx="26" ry="30" fill="#c4956a"/>
    <ellipse cx="600" cy="262" rx="22" ry="18" fill="#d4a87a"/>

    <!-- Hair -->
    <path d="M574 260 Q574 235 600 232 Q626 235 626 260 Q628 250 626 242 Q620 228 600 225 Q580 228 574 242 Q572 250 574 260 Z" fill="#2a1a0a"/>

    <!-- Eyebrows -->
    <path d="M585 258 Q590 254 596 256" stroke="#3a2a1a" stroke-width="2" fill="none"/>
    <path d="M604 256 Q610 254 615 258" stroke="#3a2a1a" stroke-width="2" fill="none"/>

    <!-- Eyes -->
    <ellipse cx="590" cy="264" rx="5" ry="4" fill="white"/>
    <ellipse cx="610" cy="264" rx="5" ry="4" fill="white"/>
    <circle cx="590" cy="264" r="3" fill="#3a2a1a"/>
    <circle cx="610" cy="264" r="3" fill="#3a2a1a"/>
    <circle cx="589" cy="263" r="1" fill="white"/>
    <circle cx="609" cy="263" r="1" fill="white"/>

    <!-- Round glasses -->
    <circle cx="590" cy="264" r="11" fill="none" stroke="#555" stroke-width="1.5"/>
    <circle cx="610" cy="264" r="11" fill="none" stroke="#555" stroke-width="1.5"/>
    <path d="M601 264 L599 264" stroke="#555" stroke-width="1.5"/>
    <path d="M579 262 Q570 260 562 258" stroke="#555" stroke-width="1" fill="none"/>
    <path d="M621 262 Q630 260 638 258" stroke="#555" stroke-width="1" fill="none"/>

    <!-- Nose -->
    <path d="M598 270 Q600 276 602 270" stroke="#b8875a" stroke-width="1.5" fill="none"/>

    <!-- Mouth -->
    <path d="M593 282 Q600 285 607 282" stroke="#8a5a3a" stroke-width="1.5" fill="none"/>

    <!-- Beard -->
    <path d="M592 286 Q600 295 608 286" fill="#3a2a1a" opacity="0.4"/>
    <ellipse cx="600" cy="290" rx="6" ry="5" fill="#3a2a1a" opacity="0.3"/>

    <!-- Cheek highlights -->
    <ellipse cx="582" cy="272" rx="4" ry="3" fill="#dbb88a" opacity="0.4"/>
    <ellipse cx="618" cy="272" rx="4" ry="3" fill="#dbb88a" opacity="0.4"/>
  </g>

  <!-- Gentle glow around Wangchuk -->
  <ellipse cx="600" cy="400" rx="80" ry="120" fill="#ffd700" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Police hands gripping from below -->
  <circle cx="540" cy="510" r="7" fill="#c4956a" opacity="0.8"/>
  <circle cx="560" cy="528" r="6" fill="#b8875a" opacity="0.8"/>
  <circle cx="640" cy="510" r="7" fill="#b8875a" opacity="0.8"/>
  <circle cx="660" cy="528" r="6" fill="#c4956a" opacity="0.8"/>

  <!-- Lathis/batons on sides -->
  <line x1="410" y1="510" x2="400" y2="570" stroke="#4a3d2e" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="790" y1="510" x2="800" y2="570" stroke="#4a3d2e" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Crowd silhouettes -->
  <g opacity="0.08">
    <circle cx="200" cy="540" r="10" fill="#333"/>
    <circle cx="220" cy="545" r="10" fill="#333"/>
    <circle cx="240" cy="538" r="10" fill="#333"/>
    <circle cx="260" cy="542" r="10" fill="#333"/>
    <circle cx="280" cy="540" r="10" fill="#333"/>
    <circle cx="940" cy="540" r="10" fill="#333"/>
    <circle cx="960" cy="545" r="10" fill="#333"/>
    <circle cx="980" cy="538" r="10" fill="#333"/>
    <circle cx="1000" cy="542" r="10" fill="#333"/>
    <circle cx="1020" cy="540" r="10" fill="#333"/>
  </g>

  <!-- Police vehicle -->
  <g opacity="0.15">
    <rect x="850" y="555" width="60" height="28" rx="4" fill="#7a6a52"/>
    <rect x="850" y="555" width="60" height="10" rx="2" fill="#8a7a5e"/>
    <circle cx="860" cy="585" r="5" fill="#555"/>
    <circle cx="900" cy="585" r="5" fill="#555"/>
  </g>

  <!-- Vignette overlay -->
  <rect width="1200" height="800" fill="url(#vignette)" pointer-events="none"/>

  <!-- Credit -->
  <text x="600" y="780" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#999" opacity="0.5">Campaign illustration</text>
</svg>